$kind: http-request
name: Retrieve a user
url: "{{baseUrl}}/v1/users/:id"
method: GET
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: "{{userId}}"
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "integer"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: text
  content: ""
examples: ./.resources/Retrieve a user.resources/examples
order: 1000
scripts:
  - type: afterResponse
    code: |-
      // Test 1: Status code is 200 OK
      pm.test("Status code is 200 OK", function () {
          pm.response.to.have.status(200);
      });

      // Test 2: Response has JSON content type
      pm.test("Response has JSON content type", function () {
          pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json");
      });

      // Test 3: Response body contains id and username
      pm.test("Response body contains id and username", function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData).to.have.property("id");
          pm.expect(jsonData).to.have.property("username");
      });

      // Test 4: id is a number
      pm.test("id is a number", function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData.id).to.be.a("number");
      });

      // Test 5: username is a non-empty string
      pm.test("username is a non-empty string", function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData.username).to.be.a("string").and.to.have.length.above(0);
      });

      // Test 6: Returned id matches the requested id
      pm.test("Returned user id matches the requested id", function () {
          const jsonData = pm.response.json();
          const requestedId = parseInt(pm.request.url.variables.get("id"));
          pm.expect(jsonData.id).to.eql(requestedId);
      });

      // Test 7: Response does NOT expose password
      pm.test("Response does not expose password field", function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData).to.not.have.property("password");
      });

      // Test 8: Response time is acceptable
      pm.test("Response time is less than 2000ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(2000);
      });
    language: text/javascript
