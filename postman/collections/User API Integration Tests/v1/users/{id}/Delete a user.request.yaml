$kind: http-request
name: Delete a user
url: "{{baseUrl}}/v1/users/:id"
method: DELETE
headers:
  Accept: application/json
  X-API-Key: "{{apiKey}}"
pathVariables:
  - key: id
    value: "{{userId}}"
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "integer"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: text
  content: ""
scripts:
  - type: afterResponse
    code: |-
      // Test 1: Status code is 200 OK
      pm.test("Status code is 200 OK", function () {
          pm.response.to.have.status(200);
      });

      // Test 2: Response has JSON content type
      pm.test("Response has JSON content type", function () {
          pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json");
      });

      // Test 3: Response body contains success message
      pm.test("Response body contains success message", function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData).to.have.property("message");
          pm.expect(jsonData.message).to.eql("User deleted successfully");
      });

      // Test 4: Response body is an object (not an array)
      pm.test("Response body is an object", function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData).to.be.an("object").and.not.an("array");
      });

      // Test 5: Response time is acceptable
      pm.test("Response time is less than 2000ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(2000);
      });

      // Clean up collection variables after deletion
      if (pm.response.code === 200) {
          pm.collectionVariables.unset("userId");
          pm.collectionVariables.unset("authToken");
      }
    language: text/javascript
examples: ./.resources/Delete a user.resources/examples
order: 3000
