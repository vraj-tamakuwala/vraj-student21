$kind: http-request
name: Register a new user
url: "{{baseUrl}}/v1/users/register"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
  X-API-Key: "{{apiKey}}"
body:
  type: json
  content: |-
    {
      "username": "{{username}}",
      "password": "{{password}}"
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "username": {
          "type": "string"
        },
        "password": {
          "type": "string"
        }
      }
    }
scripts:
  - type: beforeRequest
    code: |-
      pm.variables.set("password", pm.variables.replaceIn("{{$randomPassword}}"));
      pm.variables.set("username", pm.variables.replaceIn("{{$randomUserName}}"));
    language: text/javascript
  - type: afterResponse
    code: |+
      // Test 1: Status code is 201 Created
      pm.test("Status code is 201 Created", function () {
          pm.response.to.have.status(201);
      });

      // Test 2: Response has JSON content type
      pm.test("Response has JSON content type", function () {
          pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json");
      });

      // Test 3: Response body contains required fields
      pm.test("Response body contains id, username, and token", function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData).to.have.property("id");
          pm.expect(jsonData).to.have.property("username");
          pm.expect(jsonData).to.have.property("token");
      });

      // Test 4: id is a number
      pm.test("id is a number", function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData.id).to.be.a("number");
      });

      // Test 5: token is a non-empty string (JWT format)
      pm.test("token is a non-empty JWT string", function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData.token).to.be.a("string").and.to.have.length.above(0);
          pm.expect(jsonData.token.split(".").length).to.eql(3);
      });

      // Test 6: username in response matches the one sent
      // pm.test("username in response matches request body", function () {
      //     const jsonData = pm.response.json();
      //     const requestBody = JSON.parse(pm.request.body.raw);
      //     pm.expect(jsonData.username).to.eql(requestBody.username);
      // });

      // Save userId and token for downstream requests
      if (pm.response.code === 201) {
          const jsonData = pm.response.json();
          pm.variables.set("userId", jsonData.id);
          pm.variables.set("authToken", jsonData.token);
      }

    language: text/javascript
examples: ./.resources/Register a new user.resources/examples
order: 1000
