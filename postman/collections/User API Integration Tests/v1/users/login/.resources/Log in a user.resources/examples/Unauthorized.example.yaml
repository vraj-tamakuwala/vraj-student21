$kind: http-example
request:
  url: "{{baseUrl}}/v1/users/login"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: X-API-Key
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  body:
    type: json
    content: |-
      {
        "username": "string",
        "password": "string"
      }
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "message": "string"
      }
    $type: |-
      {
        "type": "object",
        "properties": {
          "message": {
            "type": "string"
          }
        }
      }
order: 2000
