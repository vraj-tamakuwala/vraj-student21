$kind: http-example
description: 'Credentials were valid. Returns the user''s `id`, `username`, and a session `token` to use in subsequent authenticated requests.'
request:
  url: "{{baseUrl}}/v1/users/login"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: X-API-Key
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  body:
    type: json
    content: |-
      {
        "username": "string",
        "password": "string"
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "id": 4067,
        "username": "string",
        "token": "string"
      }
    $type: |-
      {
        "allOf": [
          {
            "type": "object",
            "properties": {
              "id": {
                "type": "integer"
              },
              "username": {
                "type": "string"
              }
            }
          },
          {
            "type": "object",
            "properties": {
              "token": {
                "type": "string"
              }
            }
          }
        ]
      }
order: 1000
