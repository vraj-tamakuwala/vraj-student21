$kind: http-example
description: 'No user exists with the given `id`. The response body contains a `message` field with details about the missing resource.'
request:
  url: "{{baseUrl}}/v1/users/:id"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: X-API-Key
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  pathVariables:
    id: "549"
  body:
    type: text
    content: ""
response:
  statusCode: 404
  statusText: Not Found
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "message": "string"
      }
    $type: |-
      {
        "type": "object",
        "properties": {
          "message": {
            "type": "string"
          }
        }
      }
order: 2000
